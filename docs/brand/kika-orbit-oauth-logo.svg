  <ellipse cx="256" cy="256" rx="174" ry="59" fill="none" stroke="#8f5cff" stroke-width="16" opacity=".62" transform="rotate(28 256 256)"/>
  <circle cx="256" cy="256" r="111" fill="url(#core)" filter="url(#glow)"/>
  <circle cx="373" cy="166" r="28" fill="#ff7a2f"/>
  <path fill="#fff7e8" d="M181 318V194h35v48l43-48h43l-52 56 57 68h-45l-46-55v55h-35Zm141 0V194h35v124h-35Z"/>
