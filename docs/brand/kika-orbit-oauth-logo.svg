<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Kika Orbit OAuth Logo</title>
  <desc id="desc">Logo cuadrado de Kika Orbit para pantalla de consentimiento de OAuth.</desc>
  <defs>
    <radialGradient id="background" cx="32%" cy="24%" r="86%">
      <stop offset="0" stop-color="#3a204e"/>
      <stop offset=".48" stop-color="#1b1128"/>
      <stop offset="1" stop-color="#100b18"/>
    </radialGradient>
    <linearGradient id="orbitA" x1="78" x2="438" y1="132" y2="382" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff7a2f"/>
      <stop offset=".52" stop-color="#ffd166"/>
      <stop offset="1" stop-color="#8f5cff"/>
    </linearGradient>
    <linearGradient id="core" x1="170" x2="350" y1="164" y2="354" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff8a3d"/>
      <stop offset=".52" stop-color="#ffd166"/>
      <stop offset="1" stop-color="#8f5cff"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
